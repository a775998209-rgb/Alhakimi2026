name: EIDOS Final Build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Initialize Android Project
        run: |
          mkdir -p app/src/main/java/com/alhakimi/eidos
          echo "include ':app'" > settings.gradle
          echo "buildscript { repositories { google(); mavenCentral() }; dependencies { classpath 'com.android.tools.build:gradle:7.4.2' } }
          allprojects { repositories { google(); mavenCentral() } }" > build.gradle
          echo "plugins { id 'com.android.application' }
          android { compileSdk 33; defaultConfig { applicationId 'com.alhakimi.eidos'; minSdk 21; targetSdk 33; versionCode 1; versionName '1.0' } }" > app/build.gradle
          echo '<?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.microsoft.com/apk/res/android" package="com.alhakimi.eidos">
              <application android:label="EIDOS" android:theme="@style/Theme.AppCompat.NoActionBar">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>' > app/src/main/AndroidManifest.xml
          echo 'package com.alhakimi.eidos;
          import android.os.Bundle;
          import androidx.appcompat.app.AppCompatActivity;
          import android.widget.TextView;
          import android.graphics.Color;
          import android.view.Gravity;
          public class MainActivity extends AppCompatActivity {
              @Override protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  TextView tv = new TextView(this);
                  tv.setText("EIDOS SYSTEM\nEng. Ahmed Al-Hakimi\nOperational");
                  tv.setGravity(Gravity.CENTER);
                  tv.setTextSize(30);
                  tv.setTextColor(Color.GREEN);
                  tv.setBackgroundColor(Color.BLACK);
                  setContentView(tv);
              }
          }' > app/src/main/java/com/alhakimi/eidos/MainActivity.java

      - name: Build with Gradle
        run: |
          gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: EIDOS-Success-APK
          path: app/build/outputs/apk/debug/*.apk
